<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>麻將結算工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0e1012;
      --surface:   #161a1e;
      --border:    #2a2e34;
      --gold:      #c9a84c;
      --gold-dim:  #8a6e2e;
      --green:     #4caf82;
      --red:       #e05252;
      --muted:     #6b717a;
      --text:      #e8e2d8;
      --text-dim:  #9a9488;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      min-height: 100vh;
      padding: 24px 16px 60px;
    }

    .container {
      max-width: 520px;
      margin: 0 auto;
    }

    /* ── Header ── */
    header {
      text-align: center;
      margin-bottom: 28px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--gold);
    }
    header .session-label {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 4px;
      font-family: 'DM Mono', monospace;
    }

    /* ── Section card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }
    .card-title {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 14px;
    }

    /* ── Bottom selector ── */
    .bottom-btns {
      display: flex;
      gap: 10px;
    }
    .bottom-btn {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      font-size: 1rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }
    .bottom-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.08);
    }
    .bottom-btn:hover:not(.active) {
      border-color: var(--gold-dim);
      color: var(--text);
    }

    /* ── Player count ── */
    .count-row {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .count-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      font-size: 1.25rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s;
    }
    .count-btn:hover:not(:disabled) {
      border-color: var(--gold-dim);
      color: var(--gold);
    }
    .count-btn:disabled {
      opacity: 0.3;
      cursor: default;
    }
    .count-display {
      font-family: 'DM Mono', monospace;
      font-size: 1.25rem;
      min-width: 28px;
      text-align: center;
    }

    /* ── Player rows ── */
    .player-row {
      display: grid;
      grid-template-columns: 1fr 1fr auto auto auto;
      gap: 10px;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
    }
    .player-row:last-child { border-bottom: none; }
    .player-row input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      font-size: 0.9rem;
      width: 100%;
      transition: border-color 0.15s;
      -moz-appearance: textfield;
    }
    .player-row input::-webkit-outer-spin-button,
    .player-row input::-webkit-inner-spin-button { -webkit-appearance: none; }
    .player-row input:focus {
      outline: none;
      border-color: var(--gold-dim);
    }
    .player-row input::placeholder { color: var(--muted); }
    .pnl-display {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      width: 80px;
      text-align: right;
      white-space: nowrap;
    }
    .pnl-display.positive { color: var(--green); }
    .pnl-display.negative { color: var(--red); }
    .pnl-display.zero     { color: var(--muted); }
    .pnl-display.empty    { color: transparent; }

    /* ── Frequent players ── */
    .freq-pills {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
      min-height: 28px;
    }
    .freq-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text-dim);
      font-size: 0.85rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
    }
    .freq-pill:hover {
      border-color: var(--gold-dim);
      color: var(--text);
    }
    .freq-pill .pill-del {
      color: var(--muted);
      font-size: 0.8rem;
      line-height: 1;
      padding: 0 2px;
      border-radius: 50%;
      transition: color 0.15s;
    }
    .freq-pill .pill-del:hover { color: var(--red); }
    .freq-add-row {
      display: flex;
      gap: 8px;
    }
    .freq-add-row input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 7px 10px;
      color: var(--text);
      font-family: 'Noto Serif TC', serif;
      font-size: 0.85rem;
    }
    .freq-add-row input:focus { outline: none; border-color: var(--gold-dim); }
    .freq-add-row input::placeholder { color: var(--muted); }
    .freq-add-btn {
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--gold-dim);
      background: transparent;
      color: var(--gold);
      font-size: 0.85rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .freq-add-btn:hover { background: rgba(201,168,76,0.1); }
    .freq-empty { font-size: 0.8rem; color: var(--muted); }

    /* ── Save-to-freq btn on player row ── */
    .save-freq-btn {
      width: 28px;
      height: 28px;
      border-radius: 5px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.7rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s, border-color 0.15s;
      align-self: center;
    }
    .save-freq-btn:hover { color: var(--gold); border-color: var(--gold-dim); }

    /* ── Host badge ── */
    .host-btn {
      width: 36px;
      height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.15s, color 0.15s, background 0.15s, opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .host-btn.active {
      border-color: var(--gold);
      color: var(--gold);
      background: rgba(201,168,76,0.1);
    }
    .host-btn:hover:not(.active):not(.inactive) {
      border-color: var(--gold-dim);
      color: var(--text);
    }
    .host-btn.inactive {
      opacity: 0.15;
      pointer-events: none;
      cursor: default;
    }

    /* ── Dong host warning ── */
    .dong-host-hint {
      margin-top: 8px;
      padding: 7px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      font-family: 'DM Mono', monospace;
      background: rgba(224,82,82,0.08);
      border: 1px solid rgba(224,82,82,0.25);
      color: var(--red);
    }

    /* ── Zero-sum check ── */
    .zero-sum-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0 0;
      margin-top: 10px;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
    }
    .zero-sum-row .label { color: var(--muted); }
    .zero-sum-row .result {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }
    .zero-sum-row .result.ok   { color: var(--green); }
    .zero-sum-row .result.fail { color: var(--red); }

    /* ── Confirm button ── */
    .confirm-btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--gold);
      color: #0e1012;
      font-family: 'Noto Serif TC', serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-bottom: 16px;
    }
    .confirm-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: default;
    }
    .confirm-btn:not(:disabled):hover { opacity: 0.88; }
    .confirm-btn:not(:disabled):active { transform: scale(0.98); }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .modal-overlay.open {
      opacity: 1;
      pointer-events: all;
    }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 28px 20px 32px;
      width: 100%;
      max-width: 520px;
      transform: translateY(30px);
      transition: transform 0.2s;
    }
    .modal-overlay.open .modal { transform: translateY(0); }
    .modal-title {
      font-size: 1rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .modal-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 20px;
    }
    .modal-player-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      font-size: 0.9rem;
    }
    .modal-player-row:last-of-type { border-bottom: none; }
    .modal-player-name { color: var(--text-dim); }
    .modal-player-chips {
      font-family: 'DM Mono', monospace;
      font-size: 0.8rem;
      color: var(--muted);
      margin: 0 8px;
    }
    .modal-player-pnl {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }
    .modal-zero-sum {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: 'DM Mono', monospace;
    }
    .modal-zero-sum.ok   { background: rgba(76,175,130,0.12); color: var(--green); }
    .modal-zero-sum.fail { background: rgba(224,82,82,0.12);  color: var(--red); }
    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }
    .modal-actions button {
      flex: 1;
      padding: 13px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-family: 'Noto Serif TC', serif;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .modal-actions button:hover { opacity: 0.8; }
    .btn-back { background: transparent; color: var(--text-dim); }
    .btn-save { background: var(--gold); color: #0e1012; border-color: var(--gold); }

    /* ── History ── */
    .history-section { margin-top: 8px; }
    .history-title {
      font-size: 0.7rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
    }
    .history-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      align-items: center;
    }
    .history-tab {
      font-size: 0.78rem;
      padding: 5px 14px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'Noto Serif TC', serif;
      transition: all 0.15s;
    }
    .history-tab.active {
      background: rgba(201,168,76,0.12);
      border-color: rgba(201,168,76,0.4);
      color: var(--gold);
    }
    .history-tab:hover:not(.active) { color: var(--text-dim); }
    .notion-refresh-btn {
      margin-left: auto;
      font-size: 0.72rem;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Mono', monospace;
      transition: all 0.15s;
    }
    .notion-refresh-btn:hover { color: var(--text); border-color: var(--text-dim); }
    .notion-refresh-btn:disabled { opacity: 0.4; cursor: default; }
    .notion-player-lines {
      font-size: 0.82rem;
      color: var(--text-dim);
      font-family: 'DM Mono', monospace;
      line-height: 1.7;
      padding: 4px 0;
      white-space: pre-line;
    }
    .record-date {
      font-size: 0.75rem;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: 'DM Mono', monospace;
    }
    .history-empty {
      font-size: 0.85rem;
      color: var(--muted);
      text-align: center;
      padding: 20px 0;
    }
    .record-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }
    .record-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 14px;
      cursor: pointer;
      user-select: none;
    }
    .record-header:hover { background: rgba(255,255,255,0.02); }
    .record-title {
      font-size: 0.9rem;
      font-weight: 600;
    }
    .record-meta {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .record-bottom-tag {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--gold-dim);
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 4px;
      padding: 2px 6px;
    }
    .record-delete {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1rem;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s, background 0.15s;
    }
    .record-delete:hover { color: var(--red); background: rgba(224,82,82,0.1); }
    .record-body {
      display: none;
      padding: 0 14px 14px;
      border-top: 1px solid var(--border);
    }
    .record-body.open { display: block; }
    .record-player-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.85rem;
      padding: 6px 0;
      border-bottom: 1px solid rgba(42,46,52,0.5);
    }
    .record-player-row:last-child { border-bottom: none; }
    .record-player-name { color: var(--text-dim); }
    .record-player-pnl  { font-family: 'DM Mono', monospace; }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(12px);
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-family: 'DM Mono', monospace;
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      pointer-events: none;
      z-index: 2000;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error   { border-color: var(--red);   color: var(--red); }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <header>
    <h1>麻將結算</h1>
    <div class="session-label" id="sessionLabel">第 1 場</div>
  </header>

  <!-- 底錢 -->
  <div class="card">
    <div class="card-title">底錢</div>
    <div class="bottom-btns">
      <button class="bottom-btn" data-value="2000" onclick="selectBottom(this)">$2,000</button>
      <button class="bottom-btn" data-value="5250" onclick="selectBottom(this)">$5,250</button>
    </div>
  </div>

  <!-- 東錢 -->
  <div class="card">
    <div class="card-title">東錢（場主每將收入）</div>
    <div class="bottom-btns">
      <button class="bottom-btn" data-value="0"   onclick="selectDong(this)">無</button>
      <button class="bottom-btn" data-value="200"  onclick="selectDong(this)">$200</button>
      <button class="bottom-btn" data-value="400"  onclick="selectDong(this)">$400</button>
    </div>
    <div class="count-row" id="dongRoundsRow" style="margin-top:14px; display:none;">
      <span style="font-size:0.85rem; color:var(--text-dim); flex:1;">將數</span>
      <button class="count-btn" id="btnRoundsMinus" onclick="adjustRounds(-1)">−</button>
      <div class="count-display" id="roundsDisplay">1</div>
      <button class="count-btn" id="btnRoundsPlus"  onclick="adjustRounds(1)">＋</button>
    </div>
    <div id="dongSummary" style="display:none; margin-top:10px; padding:8px 12px; background:rgba(201,168,76,0.07); border-radius:6px; font-family:'DM Mono',monospace; font-size:0.8rem; color:var(--gold);">
    </div>
    <div id="dongHostHint" class="dong-host-hint" style="display:none;">
      ↑ 請點選玩家旁的「莊」按鈕指定場主
    </div>
  </div>

  <!-- 玩家人數 -->
  <div class="card">
    <div class="card-title">玩家人數</div>
    <div class="count-row">
      <button class="count-btn" id="btnMinus" onclick="adjustCount(-1)">−</button>
      <div class="count-display" id="countDisplay">4</div>
      <button class="count-btn" id="btnPlus"  onclick="adjustCount(1)">＋</button>
    </div>
  </div>

  <!-- 常用玩家 -->
  <div class="card">
    <div class="card-title">常用玩家</div>
    <div class="freq-pills" id="freqPills"></div>
    <div class="freq-add-row">
      <input type="text" id="freqInput" placeholder="輸入名字後新增" maxlength="10"
             onkeydown="if(event.key==='Enter') addFreqPlayer()" />
      <button class="freq-add-btn" onclick="addFreqPlayer()">＋ 新增</button>
    </div>
  </div>

  <!-- 玩家輸入 -->
  <div class="card">
    <div class="card-title">玩家籌碼</div>
    <div id="playerRows"></div>
    <div class="zero-sum-row" id="zeroSumRow" style="display:none;">
      <span class="label">零和驗算</span>
      <span class="result" id="zeroSumResult"></span>
    </div>
  </div>

  <!-- 確認結算按鈕 -->
  <button class="confirm-btn" id="confirmBtn" disabled onclick="openModal()">確認結算</button>

  <!-- 歷史紀錄 -->
  <div class="history-section">
    <div class="history-title">歷史紀錄</div>
    <div class="history-tabs">
      <button class="history-tab active" id="tabLocal" onclick="switchTab('local')">本機</button>
      <button class="history-tab" id="tabNotion" onclick="switchTab('notion')">Notion</button>
      <button class="notion-refresh-btn" id="notionRefreshBtn" style="display:none;" onclick="loadNotionRecords()">↻ 重新載入</button>
    </div>
    <div id="historyList"></div>
    <div id="notionList" style="display:none;"></div>
  </div>


</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-title">結算確認</div>
    <div class="modal-date" id="modalDate"></div>
    <div id="modalMeta" style="margin-bottom:16px; font-family:'DM Mono',monospace; font-size:0.78rem; color:var(--muted);"></div>
    <div id="modalPlayers"></div>
    <div id="modalDong" style="display:none; margin-top:10px; padding:10px 12px; border-radius:8px; background:rgba(201,168,76,0.08); border:1px solid rgba(201,168,76,0.2); font-family:'DM Mono',monospace; font-size:0.82rem; color:var(--gold);"></div>
    <div class="modal-zero-sum" id="modalZeroSum"></div>
    <div class="modal-actions">
      <button class="btn-back" onclick="closeModal()">返回</button>
      <button class="btn-save" onclick="saveRecord()">儲存</button>
    </div>
  </div>
</div>

<script>
  // ── State ──
  let bottom = null;
  let dong = 0;       // 東錢 per 將 (場主每將總收入)
  let rounds = 1;     // 將數
  let hostIndex = -1; // which player is 場主 (-1 = none)
  let playerCount = 4;
  const MIN_COUNT = 2;
  const MAX_COUNT = 8;

  // Persistent data
  let records    = JSON.parse(localStorage.getItem('mj_records')  || '[]');
  let session    = parseInt(localStorage.getItem('mj_session')    || '1', 10);
  let freqPlayers = JSON.parse(localStorage.getItem('mj_players') || '[]');

  // Player name/chips memory (survive count changes)
  const playerData = Array.from({ length: MAX_COUNT }, () => ({ name: '', chips: '' }));

  // ── Init ──
  updateSessionLabel();
  renderFreqPlayers();
  renderPlayerRows();
  renderHistory();

  // ── Frequent players ──
  function renderFreqPlayers() {
    const el = document.getElementById('freqPills');
    if (!el) return;
    if (freqPlayers.length === 0) {
      el.innerHTML = '<span class="freq-empty">尚無常用玩家</span>';
      return;
    }
    el.innerHTML = freqPlayers.map((name, idx) => `
      <span class="freq-pill" onclick="fillFreqPlayer('${escHtml(name)}')">
        ${escHtml(name)}
        <span class="pill-del" onclick="event.stopPropagation(); deleteFreqPlayer(${idx})">×</span>
      </span>
    `).join('');
  }

  function addFreqPlayer() {
    const input = document.getElementById('freqInput');
    const name = input.value.trim();
    if (!name || freqPlayers.includes(name)) { input.value = ''; return; }
    freqPlayers.push(name);
    localStorage.setItem('mj_players', JSON.stringify(freqPlayers));
    input.value = '';
    renderFreqPlayers();
  }

  function deleteFreqPlayer(idx) {
    freqPlayers.splice(idx, 1);
    localStorage.setItem('mj_players', JSON.stringify(freqPlayers));
    renderFreqPlayers();
  }

  function fillFreqPlayer(name) {
    // Fill into the next empty name slot
    for (let i = 0; i < playerCount; i++) {
      const el = document.getElementById(`name-${i}`);
      if (el && el.value.trim() === '') {
        el.value = name;
        playerData[i].name = name;
        return;
      }
    }
  }

  function saveNameToFreq(i) {
    const el = document.getElementById(`name-${i}`);
    const name = el ? el.value.trim() : playerData[i].name.trim();
    if (!name || freqPlayers.includes(name)) return;
    freqPlayers.push(name);
    localStorage.setItem('mj_players', JSON.stringify(freqPlayers));
    renderFreqPlayers();
  }

  // ── Bottom selector ──
  function selectBottom(btn) {
    // only toggle within the bottom card (first set of bottom-btns)
    btn.closest('.bottom-btns').querySelectorAll('.bottom-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    bottom = parseInt(btn.dataset.value, 10);
    updatePnlAll();
    updateConfirmBtn();
  }

  // ── 東錢 selector ──
  function selectDong(btn) {
    btn.closest('.bottom-btns').querySelectorAll('.bottom-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    dong = parseInt(btn.dataset.value, 10);
    if (dong === 0) hostIndex = -1;
    const row = document.getElementById('dongRoundsRow');
    row.style.display = dong > 0 ? 'flex' : 'none';
    updateDongTotal();
    updateHostBtnStates();
    updatePnlAll();
    updateZeroSum();
    updateConfirmBtn();
  }

  // ── 將數 ──
  function adjustRounds(delta) {
    const next = rounds + delta;
    if (next < 1) return;
    rounds = next;
    document.getElementById('roundsDisplay').textContent = rounds;
    document.getElementById('btnRoundsMinus').disabled = rounds <= 1;
    updateDongTotal();
  }

  function updateDongTotal() {
    const el = document.getElementById('dongSummary');
    const hint = document.getElementById('dongHostHint');
    if (!el) return;

    if (dong === 0) {
      el.style.display = 'none';
      if (hint) hint.style.display = 'none';
      return;
    }

    const total = dong * rounds;
    const perPlayer = total / playerCount;

    el.style.display = 'block';
    el.textContent =
      `每人付：$${perPlayer.toLocaleString()}，東家收：$${total.toLocaleString()}`;

    if (hint) hint.style.display = hostIndex === -1 ? 'block' : 'none';
  }

  function updateHostBtnStates() {
    for (let i = 0; i < playerCount; i++) {
      const btn = document.getElementById(`host-${i}`);
      if (!btn) continue;
      if (dong === 0) {
        btn.classList.add('inactive');
      } else {
        btn.classList.remove('inactive');
      }
    }
  }

  // ── Host selector ──
  function selectHost(i) {
    if (hostIndex === i) {
      hostIndex = -1;
    } else {
      hostIndex = i;
    }
    for (let j = 0; j < playerCount; j++) {
      const btn = document.getElementById(`host-${j}`);
      if (btn) btn.className = 'host-btn' + (hostIndex === j ? ' active' : '');
    }
    updatePnlAll();
    updateZeroSum();
    updateDongTotal();
  }

  // ── Player count ──
  function adjustCount(delta) {
    const next = playerCount + delta;
    if (next < MIN_COUNT || next > MAX_COUNT) return;
    saveCurrentInputs();
    playerCount = next;
    updateCountUI();
    renderPlayerRows();
    updateDongTotal();
    updateConfirmBtn();
  }

  function updateCountUI() {
    document.getElementById('countDisplay').textContent = playerCount;
    document.getElementById('btnMinus').disabled = playerCount <= MIN_COUNT;
    document.getElementById('btnPlus').disabled  = playerCount >= MAX_COUNT;
  }

  function saveCurrentInputs() {
    for (let i = 0; i < MAX_COUNT; i++) {
      const nameEl  = document.getElementById(`name-${i}`);
      const chipsEl = document.getElementById(`chips-${i}`);
      if (nameEl)  playerData[i].name  = nameEl.value;
      if (chipsEl) playerData[i].chips = chipsEl.value;
    }
  }

  // ── Player rows ──
  function renderPlayerRows() {
    const container = document.getElementById('playerRows');
    container.innerHTML = '';
    for (let i = 0; i < playerCount; i++) {
      const row = document.createElement('div');
      row.className = 'player-row';
      row.innerHTML = `
        <input type="text"   id="name-${i}"  placeholder="玩家 ${i + 1}"
               value="${escHtml(playerData[i].name)}"
               oninput="onNameInput(${i}, this.value)" />
        <input type="number" id="chips-${i}" placeholder="籌碼數"
               value="${escHtml(playerData[i].chips)}"
               oninput="onChipsInput(${i}, this.value)" />
        <div class="pnl-display empty" id="pnl-${i}">—</div>
        <button class="save-freq-btn" onclick="saveNameToFreq(${i})" title="存入常用">★</button>
        <button class="host-btn${hostIndex === i ? ' active' : ''}" id="host-${i}"
                onclick="selectHost(${i})" title="設為場主">莊</button>
      `;
      container.appendChild(row);
    }
    updatePnlAll();
    updateZeroSum();
    updateCountUI();
    updateHostBtnStates();
  }

  function onNameInput(i, val) {
    playerData[i].name = val;
  }

  function onChipsInput(i, val) {
    playerData[i].chips = val;
    updatePnl(i);
    updateZeroSum();
    updateConfirmBtn();
  }

  function calcPnl(i) {
    return parseFloat(playerData[i].chips) - bottom;
  }

  function dongTotal() {
    return dong * rounds;
  }

  function updatePnl(i) {
    const el = document.getElementById(`pnl-${i}`);
    if (!el) return;
    const chips = playerData[i].chips;
    if (chips === '' || bottom === null) {
      el.textContent = '—';
      el.className = 'pnl-display empty';
      return;
    }
    const pnl = calcPnl(i);
    el.textContent = formatPnl(pnl);
    el.className = 'pnl-display ' + pnlClass(pnl);
  }

  function updatePnlAll() {
    for (let i = 0; i < playerCount; i++) updatePnl(i);
  }

  // ── Zero-sum ──
  function updateZeroSum() {
    const allFilled = allChipsFilled();
    const row = document.getElementById('zeroSumRow');
    const res = document.getElementById('zeroSumResult');
  
    if (!allFilled || bottom === null) {
      row.style.display = 'none';
      return;
    }
  
    row.style.display = 'flex';
  
    const playerSum = getPlayerSum();
    const dongPnl = getDongPnl();
    const final = getFinalSum();
  
    if (final === 0) {
      res.textContent = `✓ 平衡（玩家 ${formatPnl(playerSum)} + 東家 ${formatPnl(dongPnl)}）`;
      res.className = 'result ok';
    } else {
      res.textContent = `✗ 不符 最終 ${formatPnl(final)}`;
      res.className = 'result fail';
    }
  }
  // ── Confirm button ──
  function updateConfirmBtn() {
    const btn = document.getElementById('confirmBtn');
    btn.disabled = !(bottom !== null && allChipsFilled());
  }

  function allChipsFilled() {
    for (let i = 0; i < playerCount; i++) {
      if (playerData[i].chips === '') return false;
    }
    return true;
  }

  // ── Modal ──
  function openModal() {
    saveCurrentInputs();
    const now = new Date();
    document.getElementById('modalDate').textContent = formatDatetime(now);

    // Meta: 底錢 + 東錢
    const metaEl = document.getElementById('modalMeta');
    if (metaEl) {
      let metaParts = [`底 $${(bottom || 0).toLocaleString()}`];
      if (dong > 0) {
        const hostName = hostIndex >= 0 ? (playerData[hostIndex].name || `玩家 ${hostIndex + 1}`) : '場主';
        metaParts.push(`東 $${(dong * rounds).toLocaleString()}（${rounds}將 · ${hostName}收）`);
      }
      metaEl.textContent = metaParts.join('　·　');
    }

    // Players
    const playersEl = document.getElementById('modalPlayers');
    playersEl.innerHTML = '';
    for (let i = 0; i < playerCount; i++) {
      const name  = playerData[i].name || `玩家 ${i + 1}`;
      const chips = parseFloat(playerData[i].chips);
      const pnl   = calcPnl(i);
      const row = document.createElement('div');
      row.className = 'modal-player-row';
      const isHost = hostIndex === i;
      row.innerHTML = `
        <span class="modal-player-name">${escHtml(name)}${isHost && dong > 0 ? ' <small style="color:var(--gold);font-size:0.7em">場主</small>' : ''}</span>
        <span class="modal-player-chips">${chips.toLocaleString()}</span>
        <span class="modal-player-pnl ${pnlClass(pnl)}">${formatPnl(pnl)}</span>
      `;
      playersEl.appendChild(row);
    }

    // 東錢
    const modalDong = document.getElementById('modalDong');
    if (dong > 0) {
      const total = dong * rounds;
      modalDong.textContent =
        `東家收：$${total.toLocaleString()}（$${dong.toLocaleString()} × ${rounds}將）`;
      modalDong.style.display = 'block';
    } else {
      modalDong.style.display = 'none';
    }

    // Zero-sum (玩家籌碼 + 東家收入)
    const finalSum = getFinalSum();
    const zs = document.getElementById('modalZeroSum');
    if (finalSum === 0) {
      zs.textContent = '✓ 零和驗算通過';
      zs.className = 'modal-zero-sum ok';
    } else {
      zs.textContent = `✗ 零和不符  差額 ${formatPnl(finalSum)}`;
      zs.className = 'modal-zero-sum fail';
    }

    document.getElementById('modalOverlay').classList.add('open');
    // 東家（第5人）
  if (dong > 0) {
    const hostPnl = getDongPnl();
  
    const row = document.createElement('div');
    row.className = 'modal-player-row';
    row.innerHTML = `
      <span class="modal-player-name" style="color:var(--gold)">東家（場主）</span>
      <span class="modal-player-chips">—</span>
      <span class="modal-player-pnl positive">${formatPnl(hostPnl)}</span>
    `;
    playersEl.appendChild(row);
  }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  // Close on overlay click
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // ── Save ──
  function saveRecord() {
    saveCurrentInputs();
    const now = new Date();
    const players = [];
    for (let i = 0; i < playerCount; i++) {
      const chips = parseFloat(playerData[i].chips);
      players.push({
        name:   playerData[i].name || `玩家 ${i + 1}`,
        chips:  chips,
        pnl:    calcPnl(i),
        isHost: hostIndex === i,
      });
    }

    const _pad = n => String(n).padStart(2, '0');
    const record = {
      id:        now.getTime(),
      session:   session,
      bottom:    bottom,
      dong:      dong,
      rounds:    rounds,
      dongTotal: dongTotal(),
      date:      now.toISOString(),
      dateStr:   `${now.getFullYear()}/${_pad(now.getMonth()+1)}/${_pad(now.getDate())} ${_pad(now.getHours())}:${_pad(now.getMinutes())}`,
      players:   players,
    };

    records.unshift(record);
    localStorage.setItem('mj_records', JSON.stringify(records));

    session++;
    localStorage.setItem('mj_session', session);

    // Notion integration hook (no-op until implemented)
    notifyNotion(record);

    // Clear inputs
    for (let i = 0; i < MAX_COUNT; i++) {
      playerData[i] = { name: '', chips: '' };
    }
    hostIndex = -1;
    renderPlayerRows();
    updateConfirmBtn();
    updateZeroSum();

    closeModal();
    updateSessionLabel();
    renderHistory();
  }

  // ── History tabs ──
  let currentTab = 'local';
  let _notionAbort = null;

  function switchTab(tab) {
    if (currentTab === tab) return;
    currentTab = tab;
    document.getElementById('tabLocal').classList.toggle('active', tab === 'local');
    document.getElementById('tabNotion').classList.toggle('active', tab === 'notion');
    document.getElementById('historyList').style.display = tab === 'local' ? '' : 'none';
    document.getElementById('notionList').style.display = tab === 'notion' ? '' : 'none';
    document.getElementById('notionRefreshBtn').style.display = tab === 'notion' ? '' : 'none';
    if (tab === 'notion') loadNotionRecords();
  }

  async function loadNotionRecords() {
    if (_notionAbort) _notionAbort.abort();
    _notionAbort = new AbortController();
    const list = document.getElementById('notionList');
    const btn  = document.getElementById('notionRefreshBtn');
    list.innerHTML = '<div class="history-empty">載入中…</div>';
    btn.disabled = true;
    try {
      const res = await fetch('/api/notion', { signal: _notionAbort.signal });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        list.innerHTML = `<div class="history-empty" style="color:var(--red)">載入失敗：${escHtml(err.error || res.status)}</div>`;
        return;
      }
      const notionRecords = await res.json();
      renderNotionHistory(notionRecords);
    } catch (e) {
      if (e.name !== 'AbortError') {
        list.innerHTML = '<div class="history-empty" style="color:var(--red)">無法連線到伺服器</div>';
      }
    } finally {
      btn.disabled = false;
    }
  }

  function renderNotionHistory(notionRecords) {
    const list = document.getElementById('notionList');
    if (!notionRecords.length) {
      list.innerHTML = '<div class="history-empty">Notion 尚無紀錄</div>';
      return;
    }
    list.innerHTML = '';
    notionRecords.forEach(rec => {
      const card = document.createElement('div');
      card.className = 'record-card';

      const title = rec.title || `第 ${rec.session} 場`;
      const dongTag = rec.dong
        ? `<span class="record-bottom-tag">東 $${rec.dongTotal.toLocaleString()}</span>`
        : '';

      card.innerHTML = `
        <div class="record-header" onclick="toggleRecord(this)">
          <span class="record-title">${escHtml(title)}</span>
          <div class="record-meta">
            <span class="record-bottom-tag">底 $${rec.bottom.toLocaleString()}</span>
            ${dongTag}
          </div>
        </div>
        <div class="record-body">
          ${rec.date ? `<div class="record-date">${escHtml(rec.date)}</div>` : ''}
          <div class="notion-player-lines">${escHtml(rec.playersText)}</div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  // ── Notion ──
  async function notifyNotion(record) {
    try {
      const res = await fetch('/api/notion', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(record)
      });
      if (res.ok) {
        showToast('已同步至 Notion', 'success');
      } else {
        const err = await res.json().catch(() => ({}));
        if (err.error === 'Notion not configured') return; // 未設定環境變數時靜默
        if (res.status === 401 || res.status === 403) {
          showToast('Notion 授權失敗，請確認 Token 及資料庫權限', 'error');
        } else if (res.status === 404) {
          showToast('Notion 資料庫不存在，請確認 DB ID', 'error');
        } else if (res.status === 400) {
          showToast('Notion 同步失敗：請求格式錯誤', 'error');
        } else {
          showToast('Notion 同步失敗', 'error');
        }
        console.error('Notion sync error', res.status, err);
      }
    } catch {
      // 非 Vercel 環境（本機直開 HTML）時靜默
    }
  }

  // ── Toast ──
  let _toastTimer = null;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    if (!el) return;
    el.textContent = msg;
    el.className = 'toast ' + (type || '');
    // force reflow so transition fires even on rapid calls
    void el.offsetWidth;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2800);
  }
  function getDongPnl() {
    if (dong === 0) return 0;
    return dong * rounds;
  }
  // ── History ──
  function renderHistory() {
    const list = document.getElementById('historyList');
    if (records.length === 0) {
      list.innerHTML = '<div class="history-empty">尚無紀錄</div>';
      return;
    }
    list.innerHTML = '';
    records.forEach((rec, idx) => {
      const card = document.createElement('div');
      card.className = 'record-card';

      const d = new Date(rec.date);
      const title = `第 ${rec.session} 場　${formatDatetime(d)}`;

      card.innerHTML = `
        <div class="record-header" onclick="toggleRecord(this)">
          <span class="record-title">${escHtml(title)}</span>
          <div class="record-meta">
            <span class="record-bottom-tag">底 ${formatMoney(rec.bottom)}</span>
            ${rec.dong ? `<span class="record-bottom-tag">東 ${formatMoney(rec.dongTotal || rec.dong)}</span>` : ''}
            <button class="record-delete" title="刪除" onclick="deleteRecord(event, ${rec.id})">×</button>
          </div>
        </div>
        <div class="record-body">
          ${rec.players.map(p => `
            <div class="record-player-row">
              <span class="record-player-name">${escHtml(p.name)}${p.isHost && rec.dong ? ' <small style="color:var(--gold-dim);font-size:0.8em">場主</small>' : ''}</span>
              <span class="record-player-pnl ${pnlClass(p.pnl)}">${formatPnl(p.pnl)}</span>
            </div>
          `).join('')}
          ${rec.dong > 0 ? `
            <div class="record-player-row">
              <span class="record-player-name" style="color:var(--gold-dim)">東家收入</span>
              <span class="record-player-pnl positive">${formatPnl(rec.dongTotal || rec.dong * (rec.rounds || 1))}</span>
            </div>
          ` : ''}
        </div>
      `;
      list.appendChild(card);
    });
  }

  function toggleRecord(header) {
    const body = header.nextElementSibling;
    body.classList.toggle('open');
  }

  function deleteRecord(e, id) {
    e.stopPropagation();
    records = records.filter(r => r.id !== id);
    localStorage.setItem('mj_records', JSON.stringify(records));
    renderHistory();
  }

  // ── Helpers ──
  function updateSessionLabel() {
    document.getElementById('sessionLabel').textContent = `第 ${session} 場`;
  }

  function getPlayerSum() {
    let sum = 0;
    for (let i = 0; i < playerCount; i++) {
      sum += calcPnl(i);
    }
    return Math.round(sum * 100) / 100;
  }

  function getFinalSum() {
    return getPlayerSum() + getDongPnl();
  }

  function formatPnl(n) {
    const abs = Math.abs(n).toLocaleString();
    return n >= 0 ? `+$${abs}` : `-$${abs}`;
  }

  function formatMoney(n) {
    return `$${n.toLocaleString()}`;
  }

  function formatDatetime(d) {
    const pad = n => String(n).padStart(2, '0');
    return `${d.getFullYear()}/${pad(d.getMonth()+1)}/${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function pnlClass(n) {
    if (n > 0) return 'positive';
    if (n < 0) return 'negative';
    return 'zero';
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
